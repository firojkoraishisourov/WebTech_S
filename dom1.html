<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Manager DOM Lab</title>
    <link rel="stylesheet" href="dom1.css">
</head>
<body>

<h1>Student Manager</h1>

<div class="form-area">

<label>Roll No:</label>
<input type="text" id="roll">

<label>Name:</label>
<input type="text" id="name">

<button id="addBtn" disabled>Add Student</button>

</div>

<br>

<input type="text" id="search" placeholder="Search student">

<br><br>

<button id="sortBtn">Sort A-Z</button>
<button id="highlightBtn">Highlight First Student</button>

<hr>

<ul id="studentList"></ul>

<p id="total">Total students: 0</p>

<p id="attendance">Present: 0 , Absent: 0</p>

<script src="dom1.js"></script>

</body>
</html>
